  .header-date { margin-top: 6px; font-size: 12px; letter-spacing: 4px; color: var(--gold-light); font-weight: 300; text-transform: uppercase; opacity: 0.7; }
  .header-divider { margin: 14px auto 0; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  .stat { flex: 1; padding: 12px 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-light); opacity: 0.7; margin-top: 2px; }

  main { padding: 20px 16px; max-width: 700px; margin: 0 auto; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; padding: 14px 48px 14px 18px; border: 1px solid var(--gold-light); border-radius: 4px; font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--dark); background: #fff; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: #C4B49A; }
  .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 18px; pointer-events: none; }

  .filter-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--gold-light); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; background: #fff; color: var(--mid); font-family: 'Jost', sans-serif; transition: all 0.15s; }
  .tab.active { background: var(--dark); color: var(--gold); border-color: var(--dark); }
  .tab:hover:not(.active) { border-color: var(--gold); color: var(--warm); }

  .guest-card { background: #fff; border: 1px solid #EDE5D8; border-radius: 4px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; }
  .guest-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background 0.18s; }
  .guest-card:hover { border-color: var(--gold); transform: translateX(2px); }
  .guest-card:hover::before { background: var(--gold); }
  .guest-card.checked-in { background: #F6FBF8; border-color: #A8D4BC; }
  .guest-card.checked-in::before { background: var(--green); }
  .guest-card.vip { background: #FFFBF3; border-color: var(--gold); }
  .guest-card.vip::before { background: var(--gold); }

  .guest-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold-light); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--warm); flex-shrink: 0; font-weight: 400; }
  .guest-card.checked-in .guest-avatar { background: var(--green-light); color: var(--green); }
  .guest-card.vip .guest-avatar { background: var(--gold); color: var(--dark); }

  .guest-info { flex: 1; min-width: 0; }
  .guest-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .guest-meta { font-size: 11px; color: var(--mid); margin-top: 1px; letter-spacing: 1px; }

  .badge { padding: 5px 12px; border-radius: 20px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
  .badge-pending { background: #F5F0E8; color: var(--mid); }
  .badge-done { background: var(--green-light); color: var(--green); }
  .badge-vip { background: var(--gold); color: var(--dark); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,20,16,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); border-radius: 6px; width: 100%; max-width: 380px; overflow: hidden; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { background: var(--dark); padding: 20px 22px; text-align: center; }
  .modal-header.vip-header { background: linear-gradient(135deg, var(--warm) 0%, #2a1c10 100%); }
  .modal-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: #fff; }
  .modal-sub { font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .modal-body { padding: 22px; }
  .modal-info-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gold-light); }
  .modal-info-row:last-of-type { border-bottom: none; }
  .modal-info-icon { font-size: 18px; width: 24px; text-align: center; }
  .modal-info-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); }
  .modal-info-value { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--dark); }
  .modal-status-row { margin-top: 16px; }
  .modal-status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
  .modal-status-badge.pending { background: #F5F0E8; color: var(--mid); }
  .modal-status-badge.done { background: var(--green-light); color: var(--green); }

  .modal-actions { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 10px; }
  .btn-checkin { width: 100%; padding: 14px; background: var(--dark); color: var(--gold); border: none; border-radius: 4px; font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-weight: 400; }
  .btn-checkin:hover { background: var(--warm); }
  .btn-checkin.checked { background: var(--green); color: #fff; }
  .btn-checkin.checked:hover { background: #1e4f38; }
  .btn-undo { width: 100%; padding: 10px; background: transparent; color: var(--red); border: 1px solid var(--red-light); border-radius: 4px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-undo:hover { background: var(--red-light); }
  .btn-close { width: 100%; padding: 10px; background: transparent; color: var(--mid); border: 1px solid #EDE5D8; border-radius: 4px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>

</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

    if (currentFilter === 'pending' && g.checkedIn) return false;
    if (currentFilter === 'checked' && !g.checkedIn) return false;
    if (TABLE_FILTER_MAP[currentFilter] && !g.table.startsWith(TABLE_FILTER_MAP[currentFilter])) return false;
    if (q && !g.name.toLowerCase().includes(q) && !g.table.toLowerCase().includes(q)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (a.checkedIn !== b.checkedIn) return a.checkedIn ? 1 : -1;
    return a.name.localeCompare(b.name, 'fr');
  });

  list.innerHTML = '';

  if (filtered.length === 0) {
    empty.classList.add('visible');
  } else {
    empty.classList.remove('visible');
    filtered.forEach(g => {
      const isVip = g.table.includes('Mariés');
      const initials = g.name.replace(/^(Mr\.|Mme|Mlle)\s+/i, '').split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
      const card = document.createElement('div');
      card.className = 'guest-card' + (g.checkedIn ? ' checked-in' : '') + (isVip ? ' vip' : '');
      card.innerHTML = `
        <div class="guest-avatar">${initials}</div>
        <div class="guest-info">
          <div class="guest-name">${g.name}</div>
          <div class="guest-meta">${g.table}${g.checkedIn && g.checkedInTime ? ' · Arrivé(e) à ' + g.checkedInTime : ''}</div>
        </div>
        <div>
          <span class="badge ${g.checkedIn ? 'badge-done' : (isVip ? 'badge-vip' : 'badge-pending')}">${g.checkedIn ? '✓ Arrivé' : (isVip ? '★ Mariés' : 'En attente')}</span>
        </div>
      `;
      card.onclick = () => openModal(g._id);
      list.appendChild(card);
    });
  }
}

function updateStats() {
  const total = guests.length;
  const checked = guests.filter(g => g.checkedIn).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-checked').textContent = checked;
  document.getElementById('stat-pending').textContent = total - checked;
  document.getElementById('stat-percent').textContent = Math.round(checked / total * 100) + '%';
}

function openModal(id) {
  currentGuestId = id;
  const g = guests[id];
  const isVip = g.table.includes('Mariés');
  document.getElementById('modalName').textContent = g.name;
  document.getElementById('modalTable').textContent = g.table;
  document.getElementById('modalHeader').className = 'modal-header' + (isVip ? ' vip-header' : '');
  document.getElementById('modalSub').textContent = isVip ? '★ Table des Mariés' : 'Invité(e)';

  const badge = document.getElementById('modalStatusBadge');
  const btnCheckin = document.getElementById('btnCheckin');
  const btnUndo = document.getElementById('btnUndo');

  if (g.checkedIn) {
    badge.className = 'modal-status-badge done';
    badge.innerHTML = '✓ Arrivé(e) à ' + g.checkedInTime;
    btnCheckin.textContent = '✓ Check-in effectué';
    btnCheckin.className = 'btn-checkin checked';
    btnUndo.style.display = 'block';
  } else {
    badge.className = 'modal-status-badge pending';
    badge.innerHTML = "○ En attente d'arrivée";
    btnCheckin.textContent = '✦ Valider l\'arrivée';
    btnCheckin.className = 'btn-checkin';
    btnUndo.style.display = 'none';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function toggleCheckin() {
  if (currentGuestId === null) return;
  const g = guests[currentGuestId];
  if (!g.checkedIn) {
    const now = new Date();
    g.checkedIn = true;
    g.checkedInTime = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    showToast('✦ ' + g.name + ' est arrivé(e)');
  }
  updateStats();
  renderList();
  openModal(currentGuestId);
}

function undoCheckin() {
  if (currentGuestId === null) return;
  guests[currentGuestId].checkedIn = false;
  guests[currentGuestId].checkedInTime = null;
  updateStats();
  renderList();
  openModal(currentGuestId);
  showToast('Check-in annulé');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

renderList();
updateStats();
</script>
</body>
</html>
